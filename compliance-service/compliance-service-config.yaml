apiVersion: v1
kind: ConfigMap
metadata:
  name: compliance-service-config
data:
  application.properties: |
    spring.application.name=compliance-service
    server.port=8082

    management.endpoints.web.exposure.include=prometheus,health
    management.endpoint.prometheus.enabled=true
    management.endpoints.web.path-mapping.prometheus=metrics
    management.endpoints.web.base-path=/

    # enable histogram bucket metrics for HTTP server requests
    management.metrics.distribution.percentiles-histogram.http.server.requests=true

    # disable unwanted default metrics
    management.metrics.enable.jvm=false
    management.metrics.enable.process=false
    management.metrics.enable.system=false
    management.metrics.enable.tomcat=false
    management.metrics.enable.executor=false
    management.metrics.enable.disk=false
    management.metrics.enable.application=false
    management.metrics.enable.logback=false
