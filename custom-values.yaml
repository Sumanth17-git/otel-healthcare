mode: daemonset

image:
  repository: otel/opentelemetry-collector-contrib

# Corrected RBAC and ServiceAccount block
serviceAccount:
  create: true
  name: otel-collector

clusterRole:
  create: true
  # This ensures the collector has permission to watch pods/nodes

extraEnvs:
  - name: K8S_NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName
  - name: NEW_RELIC_LICENSE_KEY
    valueFrom:
      secretKeyRef:
        name: newrelic-otlp-secret
        key: NR_LICENSE_KEY
  - name: K8S_CLUSTER_NAME
    value: "k8s-cluster"

config:
  receivers:
    kubeletstats:
      collection_interval: 60s
      auth_type: serviceAccount
      endpoint: "https://${env:K8S_NODE_NAME}:10250"
      insecure_skip_verify: true
    hostmetrics:
      collection_interval: 60s
      scrapers:
        cpu: {}
        memory: {}
        disk: {}
        network: {}
    prometheus:
      config:
        scrape_configs:
          - job_name: 'otel-collector'
            static_configs:
              - targets: ['localhost:8888']

  processors:
    batch: {}
    memory_limiter:
      check_interval: 1s
      limit_mib: 400
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.pod.name
          - k8s.node.name
          - k8s.namespace.name
          - k8s.deployment.name
    resource:
      attributes:
        - key: k8s.cluster.name
          value: ${env:K8S_CLUSTER_NAME}
          action: upsert

  exporters:
    otlphttp/newrelic:
      endpoint: "https://otlp.nr-data.net/v1/metrics" # Use eu.nr-data.net if in EU
      headers:
        api-key: ${env:NEW_RELIC_LICENSE_KEY}

  service:
    pipelines:
      metrics:
        receivers: [kubeletstats, hostmetrics, prometheus]
        processors: [memory_limiter, k8sattributes, resource, batch]
        exporters: [otlphttp/newrelic]
