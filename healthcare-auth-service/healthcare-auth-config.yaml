apiVersion: v1
kind: ConfigMap
metadata:
  name: healthcare-auth-config
data:
  application.properties: |
    spring.application.name=healthcare-auth-service
    server.port=8083

    # URLs of other services
    patient.service.url=http://patient-service:8081
    compliance.service.url=http://compliance-service:8082

    # actuator + metrics endpoints
    management.endpoints.web.exposure.include=prometheus,health
    management.endpoint.prometheus.enabled=true
    management.endpoints.web.path-mapping.prometheus=metrics
    management.endpoints.web.base-path=/

    # enable ONLY histogram buckets for HTTP server requests
    management.metrics.distribution.percentiles-histogram.http.server.requests=true

    # disable unwanted default metrics
    management.metrics.enable.jvm=false
    management.metrics.enable.process=false
    management.metrics.enable.system=false
    management.metrics.enable.tomcat=false
    management.metrics.enable.logback=false
