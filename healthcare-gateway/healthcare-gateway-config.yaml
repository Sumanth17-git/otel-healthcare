apiVersion: v1
kind: ConfigMap
metadata:
  name: healthcare-gateway-config
data:
  application.properties: |
    spring.application.name=healthcare-gateway
    server.port=8080

    management.endpoints.web.exposure.include=prometheus,health
    management.endpoint.prometheus.enabled=true
    management.endpoints.web.path-mapping.prometheus=metrics
    management.endpoints.web.base-path=/

    management.metrics.distribution.percentiles-histogram.http.server.requests=true
    management.metrics.enable.jvm=false
    management.metrics.enable.process=false
    management.metrics.enable.system=false
    management.metrics.enable.tomcat=false
    management.metrics.enable.logback=false

    # Route URI resolved from AUTH_SERVICE_URL env var set in the deployment
    spring.cloud.gateway.routes[0].id=auth
    spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://healthcare-auth-service:8083}
    spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
